<section class="skills" id="skills">
  <div class="skills__inner">

    <div class="skills__header">
      <p class="section-eyebrow">Skills</p>
      <h2 class="section-title">What I bring to the table</h2>
    </div>

    @for (group of skillGroups; track group.title) {
      <div class="skill-group">
        <h3 class="skill-group__title">{{ group.title }}</h3>
        <div class="skill-group__cards">
          @for (skill of group.skills; track skill.name) {
            <div class="skill-card">
              <div class="skill-card__top">
                <span class="skill-card__name">{{ skill.name }}</span>
                <span class="skill-card__badge"
                  [class.skill-card__badge--advanced]="skill.level === 'advanced'"
                  [class.skill-card__badge--intermediate]="skill.level === 'intermediate'"
                  [class.skill-card__badge--beginner]="skill.level === 'beginner'">
                  {{ skill.level === 'beginner' ? 'Beginner–Intermediate' : (skill.level | titlecase) }}
                </span>
              </div>
              <p class="skill-card__desc">{{ skill.desc }}</p>
            </div>
          }
        </div>
      </div>
    }

  </div>
</section>
